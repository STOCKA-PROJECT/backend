spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Security — fixed test secret (hex, 256 bits) so the app can boot in tests
security.jwt.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
# Fixed 2FA encryption key for tests (don't reuse outside tests).
security.twofactor.encryption-key=fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210

# Bootstrap admin — credenciales fijas para tests de integración
app.admin.bootstrap.email=joanmartorellcoll03@gmail.com
app.admin.bootstrap.password=12345678

# Email — local provider, write to temp dir during tests
app.email.provider=local
app.email.from=test@stocka.local
app.email.local.dir=${java.io.tmpdir}/stocka-test-emails
app.frontend.base-url=http://localhost:3002

# Admin bootstrap — tests rely on this admin to be seeded so they can authenticate as ADMIN.
app.admin.bootstrap.email=joanmartorellcoll03@gmail.com
app.admin.bootstrap.password=12345678

# Organizations
app.organization.max-pending-invitations=50

spring.thymeleaf.cache=false

# Storage — fuerza fallback local en tests, ignora cualquier R2_USE_LOCAL del .env
stocka.r2.use-local=true
stocka.r2.local-dir=${java.io.tmpdir}/stocka-test-r2/

# Rate limiting — desactivado por defecto en tests; los tests específicos lo activan vía @TestPropertySource.
stocka.rate-limit.enabled=false

# Mirror production: FormContentFilter disabled — see main/resources/application.properties
# and FormContentFilterDisabledIntegrationTest (Sentry STOCKA-119437818).
spring.mvc.formcontent.filter.enabled=false

# CORS — allowlist explícita para tests (sin depender de variables de entorno).
stocka.cors.allowed-origins=http://localhost:3002,https://stocka.joanmartorellcoll03.workers.dev
