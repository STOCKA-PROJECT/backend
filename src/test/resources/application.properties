spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Security — fixed test secret (hex, 256 bits) so the app can boot in tests
security.jwt.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

# Email — local provider, write to temp dir during tests
app.email.provider=local
app.email.from=test@stocka.local
app.email.local.dir=${java.io.tmpdir}/stocka-test-emails
app.frontend.base-url=http://localhost:3002

# Organizations
app.organization.max-pending-invitations=50

spring.thymeleaf.cache=false

# Storage — fuerza fallback local en tests, ignora cualquier R2_USE_LOCAL del .env
stocka.r2.use-local=true
stocka.r2.local-dir=${java.io.tmpdir}/stocka-test-r2/
