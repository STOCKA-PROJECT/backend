spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Email — local provider, write to temp dir during tests
app.email.provider=local
app.email.from=test@stocka.local
app.email.local.dir=${java.io.tmpdir}/stocka-test-emails
app.frontend.base-url=http://localhost:3002

# Organizations
app.organization.max-pending-invitations=50

spring.thymeleaf.cache=false
