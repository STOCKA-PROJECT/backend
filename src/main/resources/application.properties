spring.application.name=backend
server.port=9095

# Load .env file (optional — missing file won't fail startup)
spring.config.import=optional:file:.env[.properties]

# Spring DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Database
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:stockadb}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

## Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Flyway disabled by default; the prod profile takes over schema management (issue #13).
spring.flyway.enabled=false

# Security
security.jwt.secret-key=${JWT_SECRET_KEY}
# Access-token expiration: 15 minutes by default. Short-lived tokens limit the window
# for a stolen access token; the long-lived session is carried by the refresh-token cookie.
security.jwt.expiration-time=${JWT_EXPIRATION_TIME:900000}
# Global token-version. Bump this value to force-logout every active session (e.g. after
# a security incident). Tokens whose tokenVersion claim does not match are rejected.
security.jwt.token-version=${JWT_TOKEN_VERSION:1}

# Refresh tokens — long-lived, rotated on every /auth/refresh call. Stored as SHA-256
# hashes; the raw token only ever lives inside the httpOnly stocka_refresh cookie.
security.refresh.session-ttl-days=${REFRESH_SESSION_TTL_DAYS:7}
security.refresh.remember-ttl-days=${REFRESH_REMEMBER_TTL_DAYS:30}
security.refresh.cookie-name=${REFRESH_COOKIE_NAME:stocka_refresh}
security.refresh.cookie-path=${REFRESH_COOKIE_PATH:/auth}
# Set REFRESH_COOKIE_SECURE=false only for local HTTP dev. Prod MUST keep it true.
security.refresh.cookie-secure=${REFRESH_COOKIE_SECURE:true}
# Lax works when frontend and backend share an eTLD+1. For cross-site setups use None
# (browsers then require Secure=true). Strict blocks the cookie even on top-level POSTs.
security.refresh.cookie-same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
security.refresh.cookie-domain=${REFRESH_COOKIE_DOMAIN:}
security.refresh.cleanup-cron=${REFRESH_CLEANUP_CRON:0 15 3 * * *}

# Two-factor authentication (F2). The encryption key protects TOTP secrets at
# rest — if the DB leaks, the secrets stay unreadable. MUST be 64 hex chars
# (256 bits). Generate with: openssl rand -hex 32.
security.twofactor.encryption-key=${TWOFACTOR_ENCRYPTION_KEY:}
security.twofactor.issuer=${TWOFACTOR_ISSUER:Stocka}
security.twofactor.mfa-challenge-ttl-seconds=${TWOFACTOR_CHALLENGE_TTL:300}

# Email
app.email.provider=${EMAIL_PROVIDER:local}
app.email.from=${EMAIL_FROM:no-reply@stocka.local}
app.email.local.dir=${EMAIL_LOCAL_DIR:target/emails}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3002}

# SMTP (only used when app.email.provider=smtp)
# Defaults point to MailHog (docker-compose) for dev. Production must override SMTP_HOST/PORT/USERNAME/PASSWORD
# and set SMTP_AUTH=true / SMTP_STARTTLS=true.
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

# RESEND (only used when app.email.provider=resend)
# Sandbox: keep EMAIL_FROM=onboarding@resend.dev (delivers only to your Resend account email).
# Production: verify a domain at resend.com/domains and set EMAIL_FROM accordingly.
app.email.resend.api-key=${RESEND_API_KEY:}
app.email.resend.webhook-secret=${RESEND_WEBHOOK_SECRET:}
app.email.resend.max-retries=${RESEND_MAX_RETRIES:3}
app.email.resend.initial-backoff-ms=${RESEND_INITIAL_BACKOFF_MS:500}

# Notification dispatch — lifecycle events are coalesced per resource and only
# emitted after the quiet window has elapsed, so a quick CREATED → DELETED never
# produces email noise and burst edits collapse into a single notification.
app.notifications.window-ms=${NOTIF_WINDOW_MS:60000}
app.notifications.flush-interval-ms=${NOTIF_FLUSH_INTERVAL_MS:15000}
app.notifications.max-attempts=${NOTIF_MAX_ATTEMPTS:5}
app.notifications.batch-size=${NOTIF_BATCH_SIZE:100}

# Thymeleaf — disable cache in dev
spring.thymeleaf.cache=false

# i18n — message bundles for email content (ES default + EN + CA)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=false

# Bootstrap admin — si alguna variable está vacía, el seeder no crea cuenta y registra un WARN.
app.admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:}
app.admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}

# Organizations
app.organization.max-pending-invitations=${MAX_PENDING_INVITATIONS:50}
# Anti-DoS storage quotas (issue #21)
stocka.organizations.quota.max-orgs-per-user=${MAX_ORGS_PER_USER:10}
stocka.organizations.quota.max-pieces-per-org=${MAX_PIECES_PER_ORG:10000}
stocka.organizations.quota.max-bytes-per-org=${MAX_BYTES_PER_ORG:53687091200}

# Password reset — TTL in minutes for the one-time reset token
app.password-reset.token-ttl-minutes=${PASSWORD_RESET_TTL:30}
app.password-reset.cleanup-cron=${PASSWORD_RESET_CLEANUP_CRON:0 0 3 * * *}

# Email verification — TTL in minutes for the one-time verification token (24h default)
app.email-verification.token-ttl-minutes=${EMAIL_VERIFICATION_TTL:1440}
app.email-verification.cleanup-cron=${EMAIL_VERIFICATION_CLEANUP_CRON:0 30 3 * * *}

# Cloudflare R2 (S3-compatible). When use-local=true, attachments are stored in local-dir
# and served by LocalR2DownloadController; ignore endpoint/access-key/secret-key. Production
# must keep R2_USE_LOCAL=false (default) and provide R2_ENDPOINT, R2_ACCESS_KEY, R2_SECRET_KEY;
# R2Properties fails fast when use-local=true and an active profile contains 'prod' (issue #17).
stocka.r2.use-local=${R2_USE_LOCAL:false}
stocka.r2.bucket=${R2_BUCKET:stocka-dev}
stocka.r2.endpoint=${R2_ENDPOINT:}
stocka.r2.access-key=${R2_ACCESS_KEY:}
stocka.r2.secret-key=${R2_SECRET_KEY:}
stocka.r2.presigned-ttl-minutes=${R2_PRESIGNED_TTL:5}
stocka.r2.local-dir=${R2_LOCAL_DIR:/tmp/stocka-r2/}

# Piece attachments — independent limits per kind (IMAGE / DOCUMENT)
stocka.pieces.attachment.max-image-bytes=${PIECE_MAX_IMAGE_BYTES:26214400}
stocka.pieces.attachment.max-document-bytes=${PIECE_MAX_DOCUMENT_BYTES:104857600}
stocka.pieces.attachment.max-images-per-piece=${PIECE_MAX_IMAGES:50}
stocka.pieces.attachment.max-documents-per-piece=${PIECE_MAX_DOCUMENTS:50}
stocka.pieces.attachment.allowed-image-mimes=image/jpeg,image/png,image/webp,image/gif

# Multipart upload limits (must be larger than PIECE_MAX_DOCUMENT_BYTES)
spring.servlet.multipart.max-file-size=110MB
spring.servlet.multipart.max-request-size=110MB

# Disable Spring's FormContentFilter — the API is JSON-only and the filter only
# applies to PUT/PATCH/DELETE with Content-Type=application/x-www-form-urlencoded.
# Leaving it enabled means a malformed body (e.g. an unencoded "%" from a bot
# probing the API) reaches URLDecoder.decode and surfaces as a 500. Disabling
# lets such requests fall through to content-negotiation, which returns 415.
spring.mvc.formcontent.filter.enabled=false

# Rate limiting — in-memory token-bucket on sensitive endpoints (/auth/**, /invitations/*/accept,
# /webhooks/resend). Set to false to disable (e.g. for load testing). Trusted-proxies must list
# the IPs of reverse-proxies that are allowed to set X-Forwarded-For (comma-separated).
stocka.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
stocka.rate-limit.trusted-proxies=${RATE_LIMIT_TRUSTED_PROXIES:}

# CORS — explicit allowlist for browser clients. Use a comma-separated list of origins;
# wildcards are intentionally not supported. Methods, headers and credentials policy
# stay hard-coded in CorsProperties (Bearer-only API).
stocka.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3002,https://stocka.joanmartorellcoll03.workers.dev}

# Swagger / OpenAPI — disabled by default; enable in dev via SWAGGER_ENABLED=true (.env).
# UI: http://localhost:9095/swagger-ui.html  ·  JSON: http://localhost:9095/v3/api-docs
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Sentry — leave SENTRY_DSN empty to disable (local dev / tests).
# Docs: https://docs.sentry.io/platforms/java/guides/spring-boot/
sentry.dsn=${SENTRY_DSN:}
sentry.send-default-pii=${SENTRY_SEND_DEFAULT_PII:false}
sentry.environment=${SENTRY_ENVIRONMENT:local}
sentry.release=${SENTRY_RELEASE:}
# Performance tracing (0.0–1.0). Sample 10% of transactions by default.
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
# Capture WARN+ as breadcrumbs and ERROR+ as events from logback.
sentry.logging.minimum-breadcrumb-level=${SENTRY_BREADCRUMB_LEVEL:warn}
sentry.logging.minimum-event-level=${SENTRY_EVENT_LEVEL:error}
