# Prod profile — Hibernate is validate-only; schema changes go through Flyway migrations (issue #13).
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# Override the datasource URL without the localhost/3307 fallback present in
# application.properties: in prod we want the boot to fail fast with a clear
# "DB_HOST is required" message if the env var is missing, instead of silently
# degrading to localhost:3307 and surfacing as "Connection refused" cascades
# from every scheduled job (issue: production master "Connection refused to
# localhost:3307").
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}
