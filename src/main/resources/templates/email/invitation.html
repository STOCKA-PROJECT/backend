<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <th:block th:replace="~{email/layout :: layout(~{::content})}">
        <th:block th:fragment="content">
            <h1 style="margin:0 0 16px 0;font-size:22px;font-weight:600;color:#111827;"
                th:text="#{email.invitation.title(${orgName})}">
                Te han invitado a Acme
            </h1>
            <p style="margin:0 0 16px 0;">
                <strong th:text="${inviterName}">Joan</strong>
                <span th:text="#{email.invitation.body.middle}">te ha invitado a unirte a la organización</span>
                <strong th:text="${orgName}">Acme</strong>
                <span th:text="#{email.invitation.body.after}">en Stocka.</span>
            </p>
            <p style="margin:0 0 24px 0;" th:text="#{email.invitation.cta.intro}">
                Haz clic en el botón para aceptar la invitación:
            </p>
            <p style="margin:0 0 24px 0;text-align:center;">
                <a th:href="${acceptUrl}"
                   style="display:inline-block;background-color:#2563eb;color:#ffffff;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;"
                   th:text="#{email.invitation.cta.button}">
                    Aceptar invitación
                </a>
            </p>
            <p style="margin:0;color:#6b7280;font-size:13px;">
                <span th:text="#{email.invitation.fallback}">O copia este enlace en tu navegador:</span><br/>
                <a th:href="${acceptUrl}" th:text="${acceptUrl}" style="color:#2563eb;word-break:break-all;">https://...</a>
            </p>
        </th:block>
    </th:block>
</body>
</html>
